{% extends "base.html" %}

{% block title %}Sign Up | Resume Shortlisting System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <div class="card-header">
            <h2>Create an Account</h2>
            <p>Join as a Recruiter or Job Seeker</p>
        </div>

        <button id="google-register" type="button" class="btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.75rem; background: white; border: 1px solid var(--border); color: var(--text); font-weight: 600; padding: 0.75rem; transition: all 0.2s ease; cursor: pointer; border-radius: 8px;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign up with Google
        </button>

        <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
            <span>OR</span>
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
        </div>

        <form id="register-form" style="margin-bottom: 0;">
            <div class="form-group">
                <label for="fullname" class="form-label">Full Name</label>
                <input type="text" id="fullname" name="fullname" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="role" class="form-label">I am a...</label>
                <select id="role" name="role" class="form-control" required style="appearance: auto;">
                    <option value="" disabled selected>Select your role</option>
                    <option value="job_seeker">Job Seeker</option>
                    <option value="recruiter">Recruiter</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
        </div>
    </div>
</div>

<script type="module" src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
